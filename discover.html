<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Mixes — Drift</title>
    <meta name="description" content="Browse ambient mixes created by the Drift community. Click to listen.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .discover-page { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
        .discover-header { text-align: center; margin-bottom: 40px; }
        .discover-title { font-family: 'Space Mono', monospace; font-size: 14px; letter-spacing: 6px; color: var(--text-dim); margin-bottom: 8px; }
        .discover-subtitle { font-size: 14px; color: var(--text-secondary); font-weight: 300; }
        .mix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .mix-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(14, 14, 20, 0.7) 100%);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text);
            display: block;
        }
        .mix-card:hover {
            border-color: rgba(122, 138, 106, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .mix-card.popular {
            border-color: rgba(196, 122, 122, 0.12);
        }
        .mix-card.popular:hover {
            border-color: rgba(196, 122, 122, 0.3);
            box-shadow: 0 4px 16px rgba(196, 122, 122, 0.1);
        }
        .mix-card.popular .mix-card-name::after {
            content: ' ♥';
            color: rgba(196, 122, 122, 0.4);
            font-size: 11px;
        }
        .mix-card-name { font-size: 15px; font-weight: 400; margin-bottom: 6px; }
        .mix-card-layers { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
        .mix-fingerprint {
            display: flex;
            gap: 3px;
            margin: 10px 0 4px;
            align-items: flex-end;
            height: 12px;
        }
        .mix-fingerprint .fp-dot {
            width: 4px;
            border-radius: 1px;
            background: var(--accent);
            transition: height 0.3s;
        }
        .mix-fingerprint .fp-dot.off {
            background: rgba(255,255,255,0.03);
            height: 2px !important;
        }
        .mix-card-meta { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-dim); margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }
        .like-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .like-btn:hover { color: var(--accent); }
        .like-btn.liked { color: #c47a7a; }
        .like-count { font-family: 'Space Mono', monospace; font-size: 9px; margin-left: 4px; }
        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .mix-count {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .sort-toggle {
            display: flex;
            gap: 4px;
        }
        .sort-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sort-btn:hover { border-color: rgba(122,138,106,0.3); color: var(--text-secondary); }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); }
        .empty-state { text-align: center; color: var(--text-dim); font-size: 14px; padding: 60px 0; font-weight: 300; }
        .empty-state a { color: var(--accent); text-decoration: none; }
        .back-link { display: inline-block; margin-bottom: 24px; font-size: 12px; color: var(--text-dim); text-decoration: none; }
        .back-link:hover { color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="discover-page">
        <a href="app.html" class="back-link">back to mixer</a>

        <div class="discover-header">
            <h1 class="discover-title">DISCOVER</h1>
            <p class="discover-subtitle">mixes published by the drift community</p>
        </div>

        <div class="sort-bar">
            <span class="mix-count" id="mix-count"></span>
            <div class="sort-toggle">
                <button class="sort-btn active" data-sort="recent" id="sort-recent">recent</button>
                <button class="sort-btn" data-sort="popular" id="sort-popular">popular</button>
            </div>
        </div>
        <div class="mix-grid" id="mix-grid">
            <div class="empty-state">no published mixes yet. <a href="app.html">create one</a> and be the first</div>
        </div>
    </div>

    <script>
    const SB_URL = 'https://lxecuywjwasxijxgnutn.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZWN1eXdqd2FzeGlqeGdudXRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNDM3OTIsImV4cCI6MjA4OTcxOTc5Mn0.Wyq_doDaRZ7EfdpwM2W0_BNtaVI47yN-4cy4yTWl7jo';

    let currentSort = 'recent';
    let allMixes = [];

    document.getElementById('sort-recent').addEventListener('click', () => { setSort('recent'); });
    document.getElementById('sort-popular').addEventListener('click', () => { setSort('popular'); });

    function setSort(mode) {
        currentSort = mode;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`sort-${mode}`).classList.add('active');
        renderMixes();
    }

    async function loadMixes() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/published_mixes?order=created_at.desc&limit=50`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            allMixes = await res.json();
            renderMixes();
        } catch(e) {
            console.warn('Failed to load mixes:', e);
        }
    }

    function renderMixes() {
        const grid = document.getElementById('mix-grid');
        const mixes = [...allMixes];

        if (!mixes.length) return;

        if (currentSort === 'popular') {
            mixes.sort((a, b) => ((b.likes || 0) + (b.plays || 0)) - ((a.likes || 0) + (a.plays || 0)));
        }

        document.getElementById('mix-count').textContent = `${mixes.length} mixes`;
        grid.innerHTML = '';

        const ALL_LAYERS = ['rain','heavy-rain','thunder','wind','fire','vinyl','cafe','crickets','waves','drone','brown-noise','white-noise','train','birds','leaves','snow','binaural'];

        mixes.forEach(mix => {
                const layers = Object.keys(mix.levels).join(' + ');
                const encoded = btoa(JSON.stringify(mix.levels));
                const ago = timeAgo(new Date(mix.created_at));

                // Build fingerprint
                const fpDots = ALL_LAYERS.map(id => {
                    const vol = mix.levels[id] || 0;
                    if (vol === 0) return '<div class="fp-dot off"></div>';
                    const h = 2 + (vol / 100) * 10; // 2-12px height based on volume
                    const o = 0.3 + (vol / 100) * 0.7; // 0.3-1.0 opacity
                    return `<div class="fp-dot" style="height:${h}px;opacity:${o}"></div>`;
                }).join('');

                const likedMixes = JSON.parse(localStorage.getItem('nwl_liked') || '[]');
                const isLiked = likedMixes.includes(mix.id);
                const likes = mix.likes || 0;

                const card = document.createElement('a');
                card.className = `mix-card${likes >= 5 ? ' popular' : ''}`;
                card.href = `app.html?mix=${encoded}`;
                card.innerHTML = `
                    <div class="mix-card-name">${mix.name}</div>
                    <div class="mix-fingerprint">${fpDots}</div>
                    <div class="mix-card-layers">${layers}</div>
                    <div class="mix-card-meta">
                        <span>${ago}${mix.plays > 0 ? ` · ${mix.plays} plays` : ''}</span>
                        <button class="like-btn${isLiked ? ' liked' : ''}" data-id="${mix.id}">♥${likes > 0 ? `<span class="like-count">${likes}</span>` : ''}</button>
                    </div>
                `;
                // Like button
                const likeBtn = card.querySelector('.like-btn');
                likeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const liked = JSON.parse(localStorage.getItem('nwl_liked') || '[]');
                    if (liked.includes(mix.id)) return; // already liked
                    liked.push(mix.id);
                    localStorage.setItem('nwl_liked', JSON.stringify(liked));
                    likeBtn.classList.add('liked');
                    const countEl = likeBtn.querySelector('.like-count');
                    if (countEl) countEl.textContent = likes + 1;
                    else likeBtn.innerHTML = `♥<span class="like-count">${likes + 1}</span>`;
                    fetch(`${SB_URL}/rest/v1/rpc/like_mix`, {
                        method: 'POST',
                        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mix_id: mix.id }),
                    }).catch(() => {});
                    if (window.nwlTrack) window.nwlTrack('mix_like', { mix_name: mix.name });
                });
                // Increment play count on click
                card.addEventListener('click', () => {
                    fetch(`${SB_URL}/rest/v1/rpc/increment_plays`, {
                        method: 'POST',
                        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mix_id: mix.id }),
                    }).catch(() => {});
                });
                grid.appendChild(card);
            });
    }

    function timeAgo(date) {
        const diff = Date.now() - date.getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        const days = Math.floor(hrs / 24);
        return days + 'd ago';
    }

    loadMixes();
    // Quiet auto-refresh — new mixes just appear
    setInterval(loadMixes, 30000);
    </script>

    <script src="https://nowherelabs.dev/nav.js" defer></script>
    <script src="https://nowherelabs.dev/track.js" data-project="drift"></script>
</body>
</html>
