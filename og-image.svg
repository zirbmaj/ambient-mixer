<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080c"/>
      <stop offset="100%" style="stop-color:#0e0e14"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a8a6a;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7a8a6a;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#7a8a6a;stop-opacity:0.25"/>
      <stop offset="70%" style="stop-color:#7a8a6a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7a8a6a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle waveform lines -->
  <path d="M0,380 Q150,360 300,380 T600,380 T900,380 T1200,380" fill="none" stroke="url(#wave)" stroke-width="1.5"/>
  <path d="M0,400 Q150,370 300,400 T600,400 T900,400 T1200,400" fill="none" stroke="url(#wave)" stroke-width="1"/>
  <path d="M0,420 Q150,405 300,420 T600,420 T900,420 T1200,420" fill="none" stroke="url(#wave)" stroke-width="0.8"/>
  <path d="M0,440 Q150,430 300,440 T600,440 T900,440 T1200,440" fill="none" stroke="url(#wave)" stroke-width="0.5"/>

  <!-- DRIFT logo -->
  <text x="600" y="240" font-family="monospace" font-size="72" font-weight="700" fill="#d8d4cc" text-anchor="middle" letter-spacing="16">DRIFT</text>

  <!-- Tagline -->
  <text x="600" y="320" font-family="sans-serif" font-size="22" font-weight="300" fill="#7a7570" text-anchor="middle">the world is loud. make your own quiet.</text>

  <!-- Subtle corner branding -->
  <text x="600" y="560" font-family="monospace" font-size="11" fill="#2e2c28" text-anchor="middle" letter-spacing="4">A NOWHERE LABS PROJECT</text>
</svg>
