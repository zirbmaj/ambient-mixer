<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08080c">
    <title>Drift — ambient sound mixer</title>
    <meta name="description" content="Layer rain, fire, cafe chatter, ocean waves, and more. Create your perfect ambient soundscape. Free, no account needed.">
    <meta property="og:title" content="Drift — ambient sound mixer">
    <meta property="og:description" content="Layer rain, fire, cafe chatter, ocean waves, and more. Create your perfect ambient soundscape.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Drift — ambient sound mixer">
    <meta name="twitter:description" content="Layer rain, fire, cafe chatter, ocean waves, and more. Create your perfect ambient soundscape.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="viz-canvas"></canvas>

    <div class="mobile-start-overlay" id="mobile-start">
        <div class="start-content">
            <h1 class="start-logo">DRIFT</h1>
            <p class="start-text">tap to begin</p>
            <p class="start-hint">no audio? check your device's mute switch</p>
        </div>
    </div>

    <div class="app">
        <header class="header">
            <a href="/" style="text-decoration:none;color:inherit"><h1 class="logo">DRIFT</h1></a>
            <p class="tagline">ambient sound mixer</p>
        </header>

        <div class="now-playing-bar" id="now-playing-bar">
            <span class="np-label">playing:</span>
            <span class="np-layers" id="np-layers">slide any layer to begin. or try a mix below.</span>
        </div>

        <div class="mixer-grid" id="mixer-grid">
            <!-- Layers injected by JS -->
        </div>

        <div class="controls-bar">
            <button class="master-toggle" id="master-toggle" title="Play/Pause all">
                <span id="toggle-icon">▶</span>
            </button>
            <div class="master-volume">
                <label class="vol-label">MASTER</label>
                <input type="range" id="master-volume" min="0" max="100" value="70" class="vol-slider">
            </div>
            <div class="preset-controls">
                <button class="preset-btn" id="save-preset" title="Save mix">Save Mix</button>
                <button class="preset-btn" id="share-btn" title="Share mix">Share</button>
                <button class="preset-btn" id="publish-btn" title="Publish to discover">Publish</button>
            </div>
        </div>

        <div class="presets-section">
            <h3 class="section-header">START HERE</h3>
            <div class="presets-list" id="default-mixes"></div>
        </div>

        <div class="presets-section" id="presets-section">
            <h3 class="section-header">Your Mixes</h3>
            <div class="presets-list" id="presets-list"></div>
        </div>

        <footer class="footer">
            <p class="footer-text">DRIFT — a <a href="https://nowherelabs.dev" target="_blank">nowhere labs</a> project · <a href="https://nowherelabs.dev/chat.html" target="_blank">talk to us</a> · <a href="mailto:hello@nowherelabs.dev">feedback</a></p>
        </footer>
    </div>

    <script src="engine.js"></script>
    <script src="https://nowherelabs.dev/track.js" data-project="drift"></script>
</body>
</html>
